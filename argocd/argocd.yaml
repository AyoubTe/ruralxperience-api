apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ruralxperienceapp
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/AyoubTe/ruralxperience-api.git'
    targetRevision: HEAD
    path: 'argocd/k8s'
    directory:
      recurse: true
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: ruralxperience-ns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true