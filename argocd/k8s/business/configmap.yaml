apiVersion: v1
kind: ConfigMap
metadata:
  name: rxp-config
  namespace: ruralxperience
data:
  POSTGRES_DB: ruralxperience
  POSTGRES_USER: rxp_user
  SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-svc:5432/ruralxperience
  SPRING_DATASOURCE_USERNAME: rxp_user
  SPRING_REDIS_HOST: redis-svc
  SPRING_REDIS_PORT: "6379"
  SPRING_MAIL_HOST: mailhog-svc
  SPRING_MAIL_PORT: "1025"