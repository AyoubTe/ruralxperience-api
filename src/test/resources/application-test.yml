spring:
  datasource:
    url: jdbc:h2:mem:rural_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver

  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: create-drop # Let Hibernate build the schema from your @Entity classes
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false # This stops Flyway from running V1, V2, V3 on H2

  sql:
    init:
      mode: always
      data-locations: classpath:data.sql # This loads the clean test data I gave you