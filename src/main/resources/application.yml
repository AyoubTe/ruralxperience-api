spring:
  application:
    name: ruralxperience

  # Database
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://172.30.31.126:5432/ruralxperience}
    username: ${POSTGRES_USER:rxp_user}
    password: ${POSTGRES_PASSWORD:rxp_secret}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # JPA
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Virtual threads (Java 21 / Project Loom)
  threads:
    virtual:
      enabled: true

  # Redis cache
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

  # Cache
  cache:
    type: redis
    redis:
      time-to-live: 3600000

  # Email
  mail:
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  # Async
  task:
    execution:
      pool:
        core-size: 4
        max-size: 16
        queue-capacity: 500
      thread-name-prefix: rxp-async-

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

# Logging
logging:
  level:
    com.ruralxperience: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  prometheus:
    metrics:
      export:
        enabled: true

# Custom app properties
app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-in-production-minimum-256-bit-key-here}
    access-token-expiration: 900000       # 15 minutes
    refresh-token-expiration: 604800000   # 7 days
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:4200}
  storage:
    type: ${STORAGE_TYPE:local}           # 'local' or 's3'
    local-dir: ${STORAGE_LOCAL_DIR:uploads}
    s3-bucket: ${S3_BUCKET:ruralxperience-media}
    s3-region: ${S3_REGION:eu-west-3}
    cdn-base-url: ${CDN_BASE_URL:http://localhost:8080/files}
  email:
    enabled: ${EMAIL_ENABLED:true}
    from: ${EMAIL_FROM:noreply@ruralxperience.com}
    from-name: RuralXperience
  frontend-url: ${FRONTEND_URL:http://localhost:4200}
