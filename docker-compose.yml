version: '3.9'

services:

  postgres:
    image: postgres:16-alpine
    container_name: rxp-postgres
    environment:
      POSTGRES_DB: ruralxperience
      POSTGRES_USER: rxp_user
      POSTGRES_PASSWORD: rxp_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rxp_user -d ruralxperience"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rxp-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: rxp-mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI — open http://localhost:8025 to see emails

volumes:
  postgres_data:
  redis_data:
